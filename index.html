<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Unit Converter</title>
  </head>
  <body>
    <h1>Unit Converter</h1>

    <div class="tab" id="unit">
      <button class="tablinks active" onclick="setUnit(event, 'length')">
        Length
      </button>
      <button class="tablinks" onclick="setUnit(event, 'weight')">
        Weight
      </button>
      <button class="tablinks" onclick="setUnit(event, 'temperature')">
        Temperature
      </button>
    </div>

    <form target="_self" class="form" id="unit-converter-form">
      <p id="error" style="display: none"></p>
      <div class="form-input">
        <label for="length-to-convert">Enter the length to convert</label>
        <input type="number" name="length-to-convert" id="length-to-convert" />
      </div>

      <div class="form-input">
        <label for="unit-to-convert-from">Unit to convert from</label>
        <select name="unit-to-convert-from" id="unit-to-convert-from">
          <option value="">Select an option:</option>
        </select>
      </div>

      <div class="form-input">
        <label for="unit-to-convert-to">Unit to convert to</label>
        <select name="unit-to-convert-to" id="unit-to-convert-to">
          <option value="">Select an option:</option>
        </select>
      </div>

      <button type="submit">Convert</button>
    </form>
    
    <p id="result-calc-lbl">Result of your calculation</p>
    <p id="converted-result"></p>
    <button id="reset">Reset</button>
  </body>
  <script src="script.js"></script>
</html>
