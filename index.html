<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter</title>
  </head>
  <body>
    <h1>Unit Converter</h1>

    <select name="unit" id="unit">
      <option value="length">Length</option>
      <option value="weight">Weight</option>
      <option value="temperature">Temperature</option>
    </select>

    <form target="_self" id="unit-converter-form">
      <label for="length-to-convert">Enter the length to convert</label>
      <input type="text" name="length-to-convert" id="length-to-convert" />

      <label for="unit-to-convert-from">Unit to convert from</label>
      <select name="unit-to-convert-from" id="unit-to-convert-from">
        <option value="">Select an option:</option>
      </select>

      <label for="unit-to-convert-to">Unit to convert to</label>
      <select name="unit-to-convert-to" id="unit-to-convert-to">
        <option value="">Select an option:</option>
      </select>

      <button type="submit">Convert</button>
    </form>
    <p id="convert-result"></p>
  </body>
  <script src="script.js"></script>
</html>
